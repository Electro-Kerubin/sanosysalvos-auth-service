name: CI SonarCloud

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-analyze:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate Sonar secrets
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          if [[ -z "$SONAR_TOKEN" || -z "$SONAR_HOST_URL" || -z "$SONAR_PROJECT_KEY" || -z "$SONAR_ORGANIZATION" ]]; then
            echo "Faltan secretos requeridos: SONAR_TOKEN, SONAR_HOST_URL, SONAR_PROJECT_KEY y SONAR_ORGANIZATION"
            exit 1
          fi

      - name: Run unit tests
        run: mvn -B test --fail-at-end

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Build, test and Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=$SONAR_PROJECT_KEY
          -Dsonar.organization=$SONAR_ORGANIZATION
          -Dsonar.host.url=$SONAR_HOST_URL
          -Dsonar.token=$SONAR_TOKEN

  docker-deploy:
    name: Docker - Build & Run
    runs-on: ubuntu-latest
    needs: build-and-analyze

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (para compilar el JAR dentro de Docker)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR (sin tests, ya fueron ejecutados)
        run: mvn -B package -DskipTests

      - name: Build & start containers
        env:
          DB_USER: ${{ secrets.DB_USER || 'postgres' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'postgres' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: docker compose up -d --build

      - name: Wait for app to be healthy
        run: |
          echo "Esperando que la aplicación esté disponible..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/actuator/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Aplicación lista (HTTP $STATUS)"
              exit 0
            fi
            echo "Intento $i/30 - HTTP $STATUS - esperando 5s..."
            sleep 5
          done
          echo "❌ La aplicación no respondió a tiempo"
          docker compose logs app
          exit 1

      - name: Show running containers
        if: always()
        run: docker compose ps

      - name: Show app logs
        if: failure()
        run: docker compose logs app

      - name: Tear down containers
        if: always()
        run: docker compose down -v
